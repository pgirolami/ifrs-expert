# This file is generated by scripts/build_promptfoo_config.py.
# Do not edit it by hand. Update promptfoo_src/base.yaml and
# experiments/00_QUESTIONS/*/family.yaml, then rerun:
#   uv run python scripts/build_promptfoo_config.py

evaluateOptions:
  cache: false
  maxConcurrency: 2
  delay: 5000

prompts:
  - '{{question}}'

providers:
  - id: 'exec:uv run python scripts/run_answer.py'
    label: 'OpenAI GPT 5.4'
    config:
      llm_provider: 'openai'

tests:
  - vars:
      question: 'file://experiments/00_QUESTIONS/Q1/Q1.0.txt'
    metadata:
      family: 'Q1'
      variant: 'Q1.0'
      question_path: 'experiments/00_QUESTIONS/Q1/Q1.0.txt'
    description: 'Q1.0 - Intragroup FX hedge on recognized dividend receivable'
    assert: &q1_assertions
      - type: 'is-json'
        value: 'file://./prompts/answer_prompt_B.json'
        description: 'Output matches expected JSON schema'
      - type: 'javascript'
        value: |
          const data = JSON.parse(output);
          return Array.isArray(data.assumptions_fr) &&
                 data.assumptions_fr.length >= 1 &&
                 Array.isArray(data.approaches) &&
                 data.approaches.length >= 3 &&
                 Array.isArray(data.operational_points_fr) &&
                 data.operational_points_fr.length >= 1;
        description: 'Core structured fields are present and non-empty'
      - type: 'javascript'
        value: |
          const data = JSON.parse(output);
          const labels = data.approaches.map(a => a.normalized_label);
          return labels.includes('cash_flow_hedge') &&
                 labels.includes('fair_value_hedge') &&
                 labels.includes('net_investment_hedge');
        description: 'All expected hedge approaches are identified'
      - type: 'javascript'
        value: |
          const data = JSON.parse(output);
          return ['oui', 'non', 'oui_sous_conditions'].includes(data.recommendation?.answer);
        description: 'Recommendation answer is one of the allowed values'
      - type: 'javascript'
        value: |
          const data = JSON.parse(output);
          return typeof data.recommendation?.justification === 'string' &&
                 data.recommendation.justification.length > 80;
        description: 'Recommendation includes a non-trivial justification'
      - type: 'javascript'
        value: |
          const data = JSON.parse(output);
          return data.approaches.every(a =>
            typeof a.applicability === 'string' &&
            Array.isArray(a.references) &&
            a.references.length >= 1
          );
        description: 'Each approach has applicability and at least one reference'
      - type: 'llm-rubric'
        value: |
          The answer should:
          - clearly state whether the requested hedge treatment is applicable
          - distinguish between the main hedge approaches
          - provide reasoning that would be useful to an IFRS expert
          - include practical next steps or operational implications
        threshold: 0.8
        description: 'LLM-as-judge considers the answer is coherent, useful, and practically actionable'

  - vars:
      question: 'file://experiments/00_QUESTIONS/Q1/Q1.1.txt'
    metadata:
      family: 'Q1'
      variant: 'Q1.1'
      question_path: 'experiments/00_QUESTIONS/Q1/Q1.1.txt'
    description: 'Q1.1 - Intragroup FX hedge wording variant'
    assert: *q1_assertions

  - vars:
      question: 'file://experiments/00_QUESTIONS/Q1/Q1.2.txt'
    metadata:
      family: 'Q1'
      variant: 'Q1.2'
      question_path: 'experiments/00_QUESTIONS/Q1/Q1.2.txt'
    description: 'Q1.2 - Intragroup FX hedge wording variant'
    assert: *q1_assertions

  - vars:
      question: 'file://experiments/00_QUESTIONS/Q1/Q1.3.txt'
    metadata:
      family: 'Q1'
      variant: 'Q1.3'
      question_path: 'experiments/00_QUESTIONS/Q1/Q1.3.txt'
    description: 'Q1.3 - Intragroup FX hedge wording variant'
    assert: *q1_assertions

  - vars:
      question: 'file://experiments/00_QUESTIONS/Q1/Q1.4.txt'
    metadata:
      family: 'Q1'
      variant: 'Q1.4'
      question_path: 'experiments/00_QUESTIONS/Q1/Q1.4.txt'
    description: 'Q1.4 - Intragroup FX hedge wording variant'
    assert: *q1_assertions

readme: |
  IFRS Expert Evaluation Suite
  
  This regression suite validates:
  1. JSON schema and structured output
  2. Presence of expected hedge approaches
  3. Recommendation and justification fields
  4. Presence of references and operational points
  5. High-level reasoning quality via one model-graded rubric
  
  Run: npx promptfoo eval
  View: npx promptfoo view
