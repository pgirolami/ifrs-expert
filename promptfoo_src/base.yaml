evaluateOptions:
  cache: false
  maxConcurrency: 3
  repeat: 3


prompts:
  - '{{question}}'

providers:
  - id: 'exec:uv run python scripts/run_answer.py'
    label: 'OpenAI GPT 5.4 k=5 min-score=0.5'
    config:
      llm_provider: 'openai-codex'
      min-score: 0.5
      k: 5
  - id: 'exec:uv run python scripts/run_answer.py'
    label: 'OpenAI GPT 5.4 k=5 min-score=0.4'
    config:
      llm_provider: 'openai-codex'
      min-score: 0.4
      k: 5
  - id: 'exec:uv run python scripts/run_answer.py'
    label: 'OpenAI GPT 5.4 k=10 min-score=0.5'
    config:
      llm_provider: 'openai-codex'
      min-score: 0.5
      k: 10
  - id: 'exec:uv run python scripts/run_answer.py'
    label: 'OpenAI GPT 5.4 k=10 min-score=0.4'
    config:
      llm_provider: 'openai-codex'
      min-score: 0.4
      k: 10
  - id: 'exec:uv run python scripts/run_answer.py'
    label: 'OpenAI GPT 5.4 k=10 min-score=0.3'
    config:
      llm_provider: 'openai-codex'
      min-score: 0.3
      k: 10
  # - id: 'exec:uv run python scripts/run_answer.py'
  #   label: 'Mistral Large 3'
  #   config:
  #     llm_provider: 'Mistral'

readme: |
  IFRS Expert Evaluation Suite

  This regression suite validates:
  1. JSON schema and structured output
  2. Presence of expected hedge approaches
  3. Recommendation and justification fields
  4. Presence of references and operational points
  5. High-level reasoning quality via one model-graded rubric

  Run: make eval EXPERIMENT_DIR=promptfoo_regression
  View: make eval-view EXPERIMENT_DIR=promptfoo_regression
