readme: |
  IFRS Expert retrieval regression suite.
  
  This suite uses Promptfoo as the harness for retrieval-only checks.
  The provider shells out to `src.cli retrieve --json`; no LLM calls happen
  in this suite.
  
  Run Q1 retrieval: make eval-retrieve EXPERIMENT_DIR=promptfoo_retrieval FAMILY=Q1
