evaluateOptions:
  cache: false
  maxConcurrency: 3
  repeat: 0
  showProgressBar: true

prompts:
  - '{{question}}'

providers:
  - id: 'exec:uv run python /Users/philippe/Documents/workspace/ifrs-expert/scripts/run_retrieve.py'
    label: 'Q1 retrieval non-regression gate'
    config:
      policy-config: './effective/policy.default.yaml'
      retrieval-policy: 'standards_only_through_chunks__enriched'

tests:
  - vars:
      question: 'file://../../../00_QUESTIONS/Q1/Q1.0.txt'
    metadata:
      family: 'Q1¤'
      variant: 'Q1.0¤'
      question_path: 'experiments/00_QUESTIONS/Q1/Q1.0.txt'
    description: 'Q1.0 - Intragroup FX hedge on recognized dividend receivable'
    assert: &q1_assertions
      - type: 'javascript'
        description: 'Required Q1 authorities are in the top 5 with expected document types'
        value: |
          const data = JSON.parse(output);
          if (!data || !Array.isArray(data.document_hits)) {
            return false;
          }
          const requiredDocuments = ['ifrs9', 'ias39', 'ifric16'];
          const expectedTypes = {'ifrs9': 'IFRS-S', 'ias39': 'IAS-S', 'ifric16': 'IFRIC'};
          const top5 = data.document_hits.slice(0, 5);
          return requiredDocuments.every((docUid) => {
            const hit = top5.find((item) => item.doc_uid === docUid);
            return hit?.document_type === expectedTypes[docUid];
          });
      - type: 'javascript'
        description: 'Required chunk numbers are present for ifrs9 6.3.1-6.3.6'
        value: |
          const data = JSON.parse(output);
          if (!data || !Array.isArray(data.chunks)) {
            return false;
          }
          const expectedChunkNumbers = ['6.3.1', '6.3.2', '6.3.3', '6.3.4', '6.3.5', '6.3.6'];
          const chunksForDocument = data.chunks.filter((item) => item.doc_uid === 'ifrs9').map((item) => item.chunk_number);
          return expectedChunkNumbers.every((chunkNumber) => chunksForDocument.includes(chunkNumber));
      - type: 'javascript'
        description: 'Required chunk numbers are present for ifrs9 B6.3.1-B6.3.6'
        value: |
          const data = JSON.parse(output);
          if (!data || !Array.isArray(data.chunks)) {
            return false;
          }
          const expectedChunkNumbers = ['B6.3.1', 'B6.3.2', 'B6.3.3', 'B6.3.4', 'B6.3.5', 'B6.3.6'];
          const chunksForDocument = data.chunks.filter((item) => item.doc_uid === 'ifrs9').map((item) => item.chunk_number);
          return expectedChunkNumbers.every((chunkNumber) => chunksForDocument.includes(chunkNumber));
      - type: 'javascript'
        description: 'Required chunk numbers are present for ifric16 10-13'
