      policy-config: './effective/policy.default.yaml'
      llm_provider: 'openai-codex'

tests:
  - vars:
      question: 'file://../../../00_QUESTIONS/Q1/Q1.0.txt'
    metadata:
      family: 'Q1¤'
      variant: 'Q1.0¤'
      question_path: 'experiments/00_QUESTIONS/Q1/Q1.0.txt'
    description: 'Q1.0 - Intragroup FX hedge on recognized dividend receivable'
    assert: &q1_assertions
      - type: 'is-json'
        value: 'file://../../../../prompts/answer_prompt_B.json'
        description: 'Output matches expected JSON schema'
      - type: 'javascript'
        value: |
          const data = JSON.parse(output);
          return Array.isArray(data.assumptions_fr) &&
                 data.assumptions_fr.length >= 1 &&
                 Array.isArray(data.approaches) &&
                 data.approaches.length >= 3;
        description: 'Core structured fields are present and non-empty'
      - type: 'javascript'
        value: |
          const data = JSON.parse(output);
          const labels = data.approaches.map(a => a.normalized_label);
          return labels.includes('cash_flow_hedge') &&
                 labels.includes('fair_value_hedge') &&
                 labels.includes('hedge_of_a_net_investment_in_a_foreign_operation');
        description: 'All expected hedge approaches are identified'
      - type: 'javascript'
        value: |
          const data = JSON.parse(output);
          const byLabel = Object.fromEntries(
            data.approaches.map(a => [a.normalized_label, a.applicability])
          );
          return ['oui', 'oui_sous_conditions'].includes(byLabel.fair_value_hedge) &&
                 byLabel.cash_flow_hedge === 'non' &&
                 byLabel.hedge_of_a_net_investment_in_a_foreign_operation === 'non';
        description: 'Expected applicability is assigned to each hedge approach'
      - type: 'javascript'
        value: |
          const data = JSON.parse(output);
          return ['oui', 'oui_sous_conditions'].includes(data.recommendation?.answer);
        description: 'Recommendation answer is yes or yes-if'
      - type: 'javascript'
        value: |
          const data = JSON.parse(output);
          return typeof data.recommendation?.justification === 'string' &&
                 data.recommendation.justification.length > 80;
        description: 'Recommendation includes a non-trivial justification'
      - type: 'javascript'
        value: |
          const data = JSON.parse(output);
          return data.approaches.every(a =>
            typeof a.applicability === 'string' &&
            Array.isArray(a.references) &&
            a.references.length >= 1
          );
        description: 'Each approach has applicability and at least one reference'

