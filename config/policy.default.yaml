document_routing_post_processing:
  none: {}
  aggregate_to_main_variant:
    document_post_processing: aggregate_to_main_variant
  main_variant_only:
    filter: main_variant_only

chunk_retrieval_strategies:
  dense_chunks:
    mode: chunk_similarity
    profiles:
      default:
        filter:
          min_score: 0.53
          per_document_k: 10
        expansion:
          expand: 0
          expand_to_section: true
          full_doc_threshold: 0
          reference_expansion:
            enabled: true
            depth: 2
            max_chunks_per_seed: 1000
            max_chunks_per_doc: 1000
            section_target_max_chunks: 3
  title_chunks:
    mode: title_similarity
    profiles:
      titles_default:
        filter:
          min_score: 0.6
          per_document_k: 5

retrieval_policies:
  standards_only_through_chunks__enriched:
    querying: enriched
    document_routing:
      strategy: through_chunks
      profile: q1_authority_family
      post_processing: main_variant_only
    chunk_retrieval:
      strategy: dense_chunks
      profile: default
  standards_only_through_chunks__not-enriched:
    querying: raw
    document_routing:
      strategy: through_chunks
      profile: q1_authority_family
      post_processing: main_variant_only
    chunk_retrieval:
      strategy: dense_chunks
      profile: default
  documents2_through_chunks__raw:
    querying: raw
    document_routing:
      strategy: through_chunks
      profile: q1_authority_family
      post_processing: aggregate_to_main_variant
    chunk_retrieval:
      strategy: dense_chunks
      profile: default
  documents2_through_chunks__enriched:
    querying: enriched
    document_routing:
      strategy: through_chunks
      profile: q1_authority_family
      post_processing: aggregate_to_main_variant
    chunk_retrieval:
      strategy: dense_chunks
      profile: default
  full_documents__enriched:
    querying: enriched
    document_routing:
      strategy: through_document_representation
      profile: q1_authority_family_full_repr
      post_processing: none
    chunk_retrieval:
      strategy: dense_chunks
      profile: default
  text__enriched:
    querying: enriched
    document_routing:
      strategy: return_all
      profile: null
      post_processing: none
    chunk_retrieval:
      strategy: dense_chunks
      profile: default
  titles__enriched:
    querying: enriched
    document_routing:
      strategy: return_all
      profile: null
      post_processing: none
    chunk_retrieval:
      strategy: title_chunks
      profile: titles_default

prompts:
  answer_prompt_a_path: prompts/answer_prompt_A.txt
  answer_prompt_b_path: prompts/answer_prompt_B.txt

output:
  response_format: markdown
